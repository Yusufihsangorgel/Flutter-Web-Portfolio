name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Verify this is still the current main commit
        run: |
          git fetch origin main --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.6
          cache: true
      - run: flutter clean
      - run: flutter pub get
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:content
      - run: npm run verify:source
      - run: npm run prepare:source
      - run: flutter build web --release --wasm --no-web-resources-cdn --base-href "/${{ github.event.repository.name }}/"
      - run: npm run prepare:bundle
      - run: npm run verify:bundle
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
