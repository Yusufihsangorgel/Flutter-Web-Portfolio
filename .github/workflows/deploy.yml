name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.18.0
          cache: npm
      - name: Verify this is still the current main commit
        run: |
          git fetch origin main --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.6
          cache: true
      - run: node tool/verify_toolchain.mjs --current
      - run: flutter clean
      - run: flutter pub get
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - id: pages-base
        name: Resolve the Pages base path
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIGURED_BASE_HREF: ${{ vars.PORTFOLIO_BASE_HREF }}
        run: |
          cname="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.cname // ""' 2>/dev/null || true)"
          base_href="$(node tool/resolve_pages_base_href.mjs \
            --repository "${GITHUB_REPOSITORY#*/}" \
            --owner "${GITHUB_REPOSITORY_OWNER}" \
            --cname "${cname}" \
            --override "${CONFIGURED_BASE_HREF}")"
          echo "base_href=${base_href}" >> "${GITHUB_OUTPUT}"
      - run: npm run build:release -- --base-href "${{ steps.pages-base.outputs.base_href }}"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
