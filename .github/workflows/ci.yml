name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.6
          cache: true
      - run: flutter pub get
      - run: npm ci
      - run: npm run verify:content
      - run: npm run portfolio:validate
      - run: npm run test:template
      - run: npm run verify:hosting
      - run: npm run verify:community
      - run: npm run audit:sources
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: npm run audit:history
      - run: npm run verify:bundle
      - run: dart format --output=none --set-exit-if-changed lib test tool
      - run: bash -n tool/hosted_build.sh
      - run: node --check tool/init_portfolio.mjs
      - run: node --check tool/build_portfolio.mjs
      - run: node --check tool/deploy_portfolio.mjs
      - run: node --check tool/verify_hosting_configs.mjs
      - run: node --check tool/resolve_pages_base_href.mjs
      - run: node --check tool/verify_community_files.mjs
      - run: node --check tool/test_portfolio_init.mjs
      - run: node --check tool/test_template_clone.mjs
      - run: node --check tool/audit_repository_history.mjs
      - run: flutter analyze --fatal-infos
      - run: npm run verify:source

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.6
          cache: true
      - run: flutter pub get
      - run: flutter test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.6
          cache: true
      - run: flutter clean
      - run: flutter pub get
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:content
      - run: npm run prepare:source
      - run: flutter build web --release --wasm --no-web-resources-cdn
      - run: npm run prepare:bundle
      - run: npm run verify:bundle
      - run: docker build --tag flutter-web-portfolio:ci .
      - run: npm run test:clone
      - run: npm test
      - run: npm run verify:runtime
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-build
          path: build/web
          retention-days: 7
