name: Update Visual Snapshots

# Regenerates the Linux visual-regression baselines in the same environment the
# CI visual suite runs in, then commits them back to main. Run this by hand from
# the Actions tab after a change that legitimately shifts the rendered layout.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.18.0
          cache: npm
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.6
          cache: true
      - run: node tool/verify_toolchain.mjs --current
      - run: flutter pub get
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run prepare:source
      - run: flutter build web --release --wasm --no-web-resources-cdn
      - run: npm run prepare:bundle
      - run: npm run test:visual:update
      - name: Commit regenerated baselines
        run: |
          git config user.name "Yusuf İhsan Görgel"
          git config user.email "developeryusuf@icloud.com"
          git add tests/e2e/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(visual): regenerate linux visual baselines"
            git push
          fi
