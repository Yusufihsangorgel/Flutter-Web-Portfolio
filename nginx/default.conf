gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  application/json
  application/javascript
  application/wasm
  text/xml
  application/xml
  font/woff2
  font/ttf
  font/otf;

server_tokens off;

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  etag on;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Threaded SkWasm requires cross-origin isolation.
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "credentialless" always;
  # portfolio-csp:start
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://analytics.developeryusuf.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https: blob:; connect-src 'self' https://analytics.developeryusuf.com; frame-ancestors 'self';" always;
  # portfolio-csp:end

  location / {
    try_files $uri $uri/ /index.html;
  }

  # The release pipeline adds a content hash query to these stable Flutter
  # names, so each deployment receives a fresh cache key.
  location = /main.dart.wasm {
    expires 1y;
  }

  location = /main.dart.js {
    expires 1y;
  }

  location = /main.dart.mjs {
    default_type application/javascript;
    expires 1y;
  }

  # Renderer URLs include Flutter's exact 40-character engine revision.
  location ~* "^/canvaskit/[0-9a-f]{40}/.*\.(js|wasm)$" {
    expires 1y;
  }

  # Flutter's core bundle names are stable across releases. Revalidate them
  # so a deployment can never pair a new bootstrap with a stale Wasm binary.
  # Alpine Nginx does not map .mjs in its default MIME table. Dynamic imports
  # are rejected under nosniff unless the module is served as JavaScript.
  location ~* \.mjs$ {
    default_type application/javascript;
    expires -1;
  }

  location ~* \.(html|js|json|wasm)$ {
    expires -1;
  }

  # Renderer symbol maps are development diagnostics, never public assets.
  location ~* \.symbols$ {
    return 404;
  }

  # Alpine's MIME table does not classify the Flutter-bundled variable fonts.
  # Correct types make nosniff safe and allow Nginx to gzip ~1.2 MB of TTFs.
  location ~* \.ttf$ {
    default_type font/ttf;
    expires 1y;
  }

  location ~* \.otf$ {
    default_type font/otf;
    expires 1y;
  }

  location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|css)$ {
    expires 1y;
  }
}
