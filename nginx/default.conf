gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  application/json
  application/javascript
  application/wasm
  text/xml
  application/xml
  font/woff2;

server_tokens off;

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  etag on;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Threaded SkWasm requires cross-origin isolation.
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "credentialless" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://analytics.developeryusuf.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https: blob:; connect-src 'self' https://api.rss2json.com https://api.github.com https://analytics.developeryusuf.com; frame-ancestors 'self';" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Flutter's core bundle names are stable across releases. Revalidate them
  # so a deployment can never pair a new bootstrap with a stale Wasm binary.
  # Alpine Nginx does not map .mjs in its default MIME table. Dynamic imports
  # are rejected under nosniff unless the module is served as JavaScript.
  location ~* \.mjs$ {
    default_type application/javascript;
    expires -1;
  }

  location ~* \.(html|js|json|wasm)$ {
    expires -1;
  }

  # Renderer symbol maps are development diagnostics, never public assets.
  location ~* \.symbols$ {
    return 404;
  }

  location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|css|otf|ttf)$ {
    expires 1y;
  }
}
