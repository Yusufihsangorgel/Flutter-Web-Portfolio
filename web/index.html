  <script>
    (async function prepareCleanBootstrap() {
      const loadFlutter = function() {
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        document.body.appendChild(script);
      };

      if (!('serviceWorker' in navigator)) {
        loadFlutter();
        return;
      }

      const wasControlled = Boolean(navigator.serviceWorker.controller);
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.allSettled(
        registrations.map(function(registration) {
          return registration.unregister();
        }),
      );

      if ('caches' in window) {
        const names = await window.caches.keys();
        await Promise.allSettled(
          names.map(function(name) { return window.caches.delete(name); }),
        );
      }

      if (wasControlled) {
        try {
          if (!window.sessionStorage.getItem('portfolio-sw-clean-reload-v2')) {
            window.sessionStorage.setItem('portfolio-sw-clean-reload-v2', '1');
            window.location.reload();
            return;
          }
        } catch (_) {
          // Strict privacy contexts can disable session storage. The explicit
          // kill-switch worker still removes legacy cache ownership.
        }
      }

      loadFlutter();
    })().catch(function(error) {
      console.warn('Legacy cache cleanup was unavailable', error);
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      document.body.appendChild(script);
    });
  </script>
