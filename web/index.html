  <style>
    @font-face {

      font-style: normal;
      font-weight: 400 700;

    :root { color-scheme: dark; background: #0b0b0d; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; overflow: hidden; background: #0b0b0d; }

    /*
      The release task replaces the empty bootstrap-content block with a
      critical rendering shell generated from the canonical portfolio JSON.
      This template owns layout only; professional copy never lives here.
    */
    #bootstrap-surface {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      background:
        radial-gradient(circle at 62% 40%, rgba(91, 108, 255, 0.1), transparent 46%),
        #0b0b0d;
      opacity: 1;
      transition: opacity 90ms linear;
    }
    #bootstrap-surface.bootstrap-surface--done {
      pointer-events: none;
      opacity: 0;
    }
    .bootstrap-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      width: 100%;
      height: 100%;
      min-height: 620px;
      padding: 108px 160px 62px;
      color: #f2f0e9;
      font-family: "Space Grotesk Critical", ui-sans-serif, sans-serif;
    }
    .bootstrap-rail {
      display: flex;
      gap: 28px;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(242, 240, 233, 0.14);
      color: rgba(242, 240, 233, 0.76);
      font: 600 13px/1.4 "Space Grotesk Critical", ui-sans-serif, sans-serif;
    }
    .bootstrap-rail-end {
      display: flex;
      gap: 18px;
      align-items: center;
      text-align: right;
    }
    .bootstrap-stage {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 42px 0 28px;
    }
    .bootstrap-title {
      display: flex;
      flex-direction: column;
      margin: 0;
      font-size: clamp(100px, 7.7vw, 132px);
      font-weight: 760;
      line-height: 0.82;
      letter-spacing: -0.05em;
      text-transform: uppercase;
    }
    .bootstrap-title-accent {
      align-self: flex-end;
      padding-right: 0.04em;
      color: #5b6cff;
      font-family: "Instrument Serif Critical", Georgia, serif;
      font-size: 1.07em;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.035em;
      text-transform: none;
    }
    .bootstrap-footer {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.9fr);
      gap: clamp(52px, 8vw, 110px);
      align-items: end;
    }
    .bootstrap-statement-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .bootstrap-statement {
      max-width: 580px;
      margin: 0;
      color: rgba(242, 240, 233, 0.94);
      font-size: clamp(18px, 1.55vw, 22px);
      font-weight: 520;
      line-height: 1.36;
      letter-spacing: -0.02em;
    }
    .bootstrap-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }
    .bootstrap-action {
      box-sizing: border-box;
      padding: 16px 32px;
      color: rgba(242, 240, 233, 0.76);
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font: 500 14px/1.55 "Space Grotesk Critical", ui-sans-serif, sans-serif;
      letter-spacing: 2px;
    }
    .bootstrap-action--primary {
      color: #fff;
      background: #5b6cff;
      border-color: rgba(91, 108, 255, 0.8);
    }
    .bootstrap-facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(16px, 2vw, 28px);
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .bootstrap-fact {
      padding-top: 11px;
      border-top: 1px solid rgba(242, 240, 233, 0.24);
      color: rgba(242, 240, 233, 0.94);
      font: 600 13px/1.35 "Space Grotesk Critical", ui-sans-serif, sans-serif;
    }
    .bootstrap-fact-label {
      display: block;
      margin-bottom: 7px;
      color: rgba(242, 240, 233, 0.5);
      font-size: 11px;
      font-weight: 400;
    }
    .bootstrap-progress {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 2px;
      overflow: hidden;
      background: rgba(91, 108, 255, 0.08);
    }
    .bootstrap-progress::after {
      display: block;
      width: 28%;
      height: 100%;
      content: "";
      background: #5b6cff;
      transform: translateX(-100%);
      animation: bootstrap-progress 1.25s cubic-bezier(.22, 1, .36, 1) infinite;
    }
    .bootstrap-error {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(420px, calc(100% - 48px));
      color: #f2f0e9;
      font: 500 15px/1.6 "JetBrains Mono Critical", ui-monospace, monospace;
      text-align: center;
      transform: translate(-50%, -50%);
    }
    .bootstrap-retry {
      display: block;
      margin: 22px auto 0;
      padding: 10px 16px;
      color: #f2f0e9;
      cursor: pointer;
      background: rgba(91, 108, 255, 0.12);
      border: 1px solid rgba(91, 108, 255, 0.72);
      font: inherit;
    }
    @keyframes bootstrap-progress {
      0% { transform: translateX(-100%); }
      65%, 100% { transform: translateX(460%); }
    }
    @media (max-width: 1400px) and (min-width: 900px) {
      .bootstrap-shell { padding-right: 80px; padding-left: 80px; }
      .bootstrap-title { font-size: clamp(72px, 9vw, 96px); }

    @media (max-width: 899px) {

      .bootstrap-title-accent { align-self: flex-start; }

      .bootstrap-statement {

    @media (max-width: 339px) {

      .bootstrap-actions {
        display: grid;

      .bootstrap-action { width: 100%; text-align: center; }
    }
    @media (min-width: 600px) and (max-width: 899px) {

    @media (max-height: 480px) and (orientation: landscape) {

      .bootstrap-fact { padding-top: 6px; font-size: 10px; }
      .bootstrap-fact-label { margin-bottom: 3px; font-size: 9px; }
    }
    @media (prefers-reduced-motion: reduce) {
      #bootstrap-surface { transition: none; }
      .bootstrap-progress::after { animation: none; transform: none; width: 100%; opacity: 0.5; }
    }

  <script>
    // Retire legacy Flutter service workers without delaying or reloading the
    // current document. A prior controlled visit can therefore never create a
    // visible double-start sequence.
    window.addEventListener('load', function retireLegacyCacheOwnership() {
      if (!('serviceWorker' in navigator)) return;
      var scopeRoot = new URL('.', document.baseURI).href;
      navigator.serviceWorker.getRegistrations()
        .then(function(registrations) {
          return Promise.allSettled(
            registrations
              .filter(function(registration) {
                return registration.scope.startsWith(scopeRoot);
              })
              .map(function(registration) {
                return registration.unregister();
              }),
          );
        })
        .then(function() {
          if (!('caches' in window)) return [];
          return window.caches.keys().then(function(names) {
            return Promise.allSettled(
              names.map(function(name) {
                return window.caches.open(name)
                  .then(function(cache) { return cache.keys(); })
                  .then(function(requests) {
                    var belongsToPortfolio = requests.length > 0 &&
                      requests.every(function(request) {
                        return request.url.startsWith(scopeRoot);
                      });
                    return belongsToPortfolio
                      ? window.caches.delete(name)
                      : false;
                  });
              }),
            );
          });
        })
        .catch(function(error) {
          console.warn('Legacy cache cleanup was unavailable', error);
        });
    }, { once: true });
  </script>
