<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- SEO — Update these with your own info -->
  <title>Flutter Developer Portfolio</title>
  <meta name="description" content="Senior Flutter & Mobile Developer specializing in Clean Architecture, Dart 3.x, and responsive cross-platform applications.">
  <meta name="keywords" content="Flutter, Dart, Mobile Developer, Portfolio, Clean Architecture, GetX, Web Developer">
  <meta name="author" content="Your Name">

  <!-- Open Graph — Update og:url and og:image with your deployment URL -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Flutter Developer Portfolio">
  <meta property="og:description" content="Interactive portfolio built with Flutter Web featuring cinematic theme, animations, and clean architecture.">
  <meta property="og:site_name" content="Developer Portfolio">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:image:alt" content="Flutter Developer Portfolio">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Flutter Developer Portfolio">
  <meta name="twitter:description" content="Interactive Flutter Web portfolio with cinematic theme and clean architecture.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme -->
  <meta name="theme-color" content="#00101F">
  <meta name="msapplication-TileColor" content="#00101F">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <!-- JSON-LD Structured Data -->
  <!-- Structured data — Update with your own info -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Your Name",
    "jobTitle": "Software Engineer",
    "url": "https://your-domain.com",
    "sameAs": [
      "https://github.com/your-username",
      "https://linkedin.com/in/your-profile/"
    ]
  }
  </script>

  <style>
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background-color: #00101F;
      overflow: hidden;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <script defer src="https://analytics.developeryusuf.com/u.js" data-website-id="d886a5af-f459-434b-80b5-d8bac04a294a"></script>
  <script>
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
