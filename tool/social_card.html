<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1200, initial-scale=1">
    <title>Portfolio social card</title>
    <style>
      @font-face {
        font-family: "Portfolio Sans";
        src: url("../assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf") format("truetype");
        font-weight: 300 700;
      }
      @font-face {
        font-family: "Portfolio Serif";
        src: url("../assets/fonts/instrument_serif/InstrumentSerif-Italic.ttf") format("truetype");
        font-style: italic;
      }
      * { box-sizing: border-box; }
      html, body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
      }
      body {
        position: relative;
        color: #f4efe4;
        background:
          radial-gradient(circle at 70% 40%, rgba(228, 122, 87, 0.14), transparent 42%),
          #11100e;
        font-family: "Portfolio Sans", Inter, sans-serif;
      }
      body::before {
        position: absolute;
        top: 0;
        right: 0;
        width: 17px;
        height: 100%;
        content: "";
        background: #e47a57;
      }
      .card {
        position: absolute;
        inset: 0;
        padding: 58px 70px 54px;
        overflow: hidden;
      }
      .rail {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(244, 239, 228, 0.16);
        color: #c4bcaf;
        font: 600 16px/1 "Portfolio Sans", Inter, sans-serif;
      }
      .rail span:first-child { margin-right: auto; }
      .rail span {
        max-width: 72%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .title {
        position: absolute;
        top: 173px;
        left: 70px;
        z-index: 2;
        display: flex;
        width: min(880px, calc(100% - 140px));
        flex-direction: column;
        margin: 0;
        font-size: 108px;
        font-weight: 680;
        line-height: 0.76;
        letter-spacing: -0.06em;
      }
      .title-primary { display: block; white-space: nowrap; }
      .title-accent {
        align-self: flex-end;
        margin-right: 76px;
        color: #e47a57;
        font-family: "Portfolio Serif", Georgia, serif;
        font-size: 1.04em;
        font-style: italic;
        font-weight: 400;
        letter-spacing: -0.035em;
      }
      .footer {
        position: absolute;
        right: 70px;
        bottom: 54px;
        left: 70px;
        z-index: 2;
        display: flex;
        align-items: end;
        justify-content: space-between;
      }
      .subtitle {
        max-width: 610px;
        margin: 0;
        color: #c4bcaf;
        font-size: 19px;
        line-height: 1.42;
      }
      .domain {
        color: #e47a57;
        font: 650 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.12em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <header class="rail">
        <span data-role></span><span data-focus></span>
      </header>
      <h1 class="title"><span class="title-primary" data-name-primary></span><span class="title-accent" data-name-accent></span></h1>
      <footer class="footer">
        <p class="subtitle" data-headline></p>
        <div class="domain" data-domain></div>
      </footer>
    </main>
  </body>
</html>
