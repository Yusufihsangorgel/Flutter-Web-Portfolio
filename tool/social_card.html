<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1200, initial-scale=1">
    <title>Senior Flutter Engineer social card</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050611;
      }

      * { box-sizing: border-box; }

      html, body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        color: #f5f7fb;
        background:
          radial-gradient(circle at 82% 18%, rgba(124, 58, 237, 0.28), transparent 35%),
          radial-gradient(circle at 12% 88%, rgba(8, 145, 178, 0.18), transparent 33%),
          #050611;
      }

      .frame {
        position: absolute;
        inset: 42px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 56px 62px 46px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 28px;
        background: rgba(12, 13, 28, 0.82);
      }

      .frame::after {
        position: absolute;
        right: -55px;
        bottom: -115px;
        content: "01";
        color: rgba(139, 92, 246, 0.09);
        font-size: 280px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.1em;
      }

      .eyebrow {
        display: flex;
        gap: 12px;
        align-items: center;
        color: #a78bfa;
        font: 700 14px/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 9px;
        height: 9px;
        content: "";
        border-radius: 50%;
        background: #8b5cf6;
      }

      h1 {
        max-width: 900px;
        margin: 28px 0 22px;
        font-size: 78px;
        font-weight: 790;
        line-height: 0.94;
        letter-spacing: -0.055em;
      }

      h1 span { color: #a78bfa; }

      .subtitle {
        max-width: 760px;
        margin: 0;
        color: #aeb6c7;
        font-size: 23px;
        line-height: 1.5;
      }

      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .disciplines {
        display: flex;
        gap: 10px;
      }

      .disciplines span {
        padding: 9px 13px;
        color: #d8dce7;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.035);
        font: 600 12px/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .domain {
        color: #858da0;
        font: 600 13px/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section>
        <div class="eyebrow">Product-minded Flutter engineering</div>
        <h1>SENIOR FLUTTER<br><span>ENGINEER.</span></h1>
        <p class="subtitle">
          Production applications and selected product work across mobile,
          desktop, and web.
        </p>
      </section>

      <footer class="footer">
        <div class="disciplines">
          <span>MOBILE</span>
          <span>DESKTOP</span>
          <span>WEB</span>
          <span>OFFLINE-FIRST</span>
        </div>
        <div class="domain">developeryusuf.com</div>
      </footer>
    </main>
  </body>
</html>
