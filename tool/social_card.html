<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1200, initial-scale=1">
    <title>Portfolio social card</title>
    <style>
      @font-face {
        font-family: "Atlas Sans";
        src: url("../assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf") format("truetype");
        font-weight: 300 700;
      }
      @font-face {
        font-family: "Atlas Serif";
        src: url("../assets/fonts/instrument_serif/InstrumentSerif-Italic.ttf") format("truetype");
        font-style: italic;
      }
      * { box-sizing: border-box; }
      html, body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
      }
      body {
        position: relative;
        color: #f2f0e9;
        background:
          radial-gradient(circle at 70% 40%, rgba(91, 108, 255, 0.14), transparent 42%),
          #0b0b0d;
        font-family: "Atlas Sans", Inter, sans-serif;
      }
      body::before {
        position: absolute;
        inset: 55% -15% -48%;
        content: "";
        opacity: 0.3;
        background-image:
          linear-gradient(rgba(91, 108, 255, 0.28) 1px, transparent 1px),
          linear-gradient(90deg, rgba(91, 108, 255, 0.28) 1px, transparent 1px);
        background-size: 76px 48px;
        transform: perspective(500px) rotateX(63deg);
        transform-origin: center top;
        mask-image: linear-gradient(to bottom, transparent, black 28%, transparent 96%);
      }
      .frame {
        position: absolute;
        inset: 34px;
        padding: 30px 42px;
        overflow: hidden;
        border: 1px solid rgba(242, 240, 233, 0.16);
      }
      .rail {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(242, 240, 233, 0.16);
        font: 650 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.14em;
      }
      .rail span:first-child { margin-right: auto; }
      .rail i {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #dfff3f;
      }
      .title {
        position: absolute;
        top: 160px;
        left: 44px;
        z-index: 2;
        margin: 0;
        font-size: 94px;
        font-weight: 680;
        line-height: 0.76;
        letter-spacing: -0.06em;
      }
      .title-primary { display: block; }
      .title-accent {
        display: block;
        margin-left: 355px;
        color: #5b6cff;
        font-family: "Atlas Serif", Georgia, serif;
        font-size: 1.04em;
        font-style: italic;
        font-weight: 400;
        letter-spacing: -0.035em;
      }
      .atlas { position: absolute; inset: 92px 70px 105px 500px; }
      .plane {
        position: absolute;
        width: 180px;
        height: 112px;
        border: 1px solid rgba(91, 108, 255, 0.42);
        background: rgba(91, 108, 255, 0.03);
        transform: rotate(var(--r));
      }
      .plane:nth-child(1) { top: 8px; left: 120px; --r: 36deg; }
      .plane:nth-child(2) { top: 30px; right: 20px; --r: -44deg; }
      .plane:nth-child(3) { top: 160px; left: 10px; --r: 4deg; }
      .plane:nth-child(4) { top: 180px; right: 0; --r: 8deg; }
      .plane:nth-child(5) { bottom: 0; left: 180px; --r: -32deg; }
      .footer {
        position: absolute;
        right: 42px;
        bottom: 32px;
        left: 42px;
        z-index: 2;
        display: flex;
        align-items: end;
        justify-content: space-between;
      }
      .subtitle {
        max-width: 610px;
        margin: 0;
        color: #b8b6af;
        font-size: 19px;
        line-height: 1.42;
      }
      .domain {
        color: #68e4ff;
        font: 650 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.12em;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <header class="rail">
        <span>00 / FRAME LIFECYCLE</span><span data-focus></span><i></i>
      </header>
      <div class="atlas" aria-hidden="true">
        <i class="plane"></i><i class="plane"></i><i class="plane"></i>
        <i class="plane"></i><i class="plane"></i>
      </div>
      <h1 class="title"><span class="title-primary" data-role-primary></span><span class="title-accent" data-role-accent></span></h1>
      <footer class="footer">
        <p class="subtitle" data-headline></p>
        <div class="domain" data-domain></div>
      </footer>
    </main>
  </body>
</html>
