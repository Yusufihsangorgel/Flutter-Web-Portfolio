  <style>
    :root { color-scheme: dark; background: #0b0b0d; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; overflow: hidden; background: #0b0b0d; }

    /*
      A neutral compositor bed, not a second portfolio screen. It has no
      headline, navigation, or duplicated professional content; Flutter owns
      the first meaningful frame.
    */
    #bootstrap-surface {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      background:
        radial-gradient(circle at 62% 40%, rgba(91, 108, 255, 0.1), transparent 46%),
        #0b0b0d;
      opacity: 1;
      transition: opacity 90ms linear;
    }
    #bootstrap-surface::before {
      position: absolute;
      inset: 55% -18% -38%;
      content: "";
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(91, 108, 255, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91, 108, 255, 0.18) 1px, transparent 1px);
      background-size: 72px 54px;
      transform: perspective(520px) rotateX(64deg);
      transform-origin: center top;
      mask-image: linear-gradient(to bottom, transparent, black 28%, transparent 92%);
    }
    #bootstrap-surface.bootstrap-surface--done {
      pointer-events: none;
      opacity: 0;
    }
    .bootstrap-progress {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 2px;
      overflow: hidden;
      background: rgba(91, 108, 255, 0.08);
    }
    .bootstrap-progress::after {
      display: block;
      width: 28%;
      height: 100%;
      content: "";
      background: #5b6cff;
      transform: translateX(-100%);
      animation: bootstrap-progress 1.25s cubic-bezier(.22, 1, .36, 1) infinite;
    }
    .bootstrap-error {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(420px, calc(100% - 48px));
      color: #f2f0e9;
      font: 500 15px/1.6 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      text-align: center;
      transform: translate(-50%, -50%);
    }
    .bootstrap-retry {
      display: block;
      margin: 22px auto 0;
      padding: 10px 16px;
      color: #f2f0e9;
      cursor: pointer;
      background: rgba(91, 108, 255, 0.12);
      border: 1px solid rgba(91, 108, 255, 0.72);
      font: inherit;
    }
    @keyframes bootstrap-progress {
      0% { transform: translateX(-100%); }
      65%, 100% { transform: translateX(460%); }
    }
    @media (prefers-reduced-motion: reduce) {
      #bootstrap-surface { transition: none; }
      .bootstrap-progress::after { animation: none; transform: none; width: 100%; opacity: 0.5; }
    }
  </style>

  <script>
    // Retire legacy Flutter service workers without delaying or reloading the
    // current document. A prior controlled visit can therefore never create a
    // visible double-start sequence.
    window.addEventListener('load', function retireLegacyCacheOwnership() {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations()
        .then(function(registrations) {
          return Promise.allSettled(
            registrations.map(function(registration) {
              return registration.unregister();
            }),
          );
        })
        .then(function() {
          if (!('caches' in window)) return [];
          return window.caches.keys().then(function(names) {
            return Promise.allSettled(
              names.map(function(name) { return window.caches.delete(name); }),
            );
          });
        })
        .catch(function(error) {
          console.warn('Legacy cache cleanup was unavailable', error);
        });
    }, { once: true });
  </script>
