  <script>
    // Flutter's Navigator 1.0 normally creates a second, synthetic browser
    // history entry during bootstrap. This document owns chapter history
    // itself, so mark the direct-load entry as Flutter-managed before the
    // engine starts and keep deep links as a single browser entry.
    if (!history.state || history.state.flutter !== true) {
      history.replaceState({ flutter: true }, 'flutter', location.href);
    }

    // This single-page document owns chapter history, while Flutter owns
    // transient overlay routes. A chapter pop is forwarded only to the document
    // controller. When an overlay is open, an Escape key event closes it through
    // Flutter's normal Navigator lifecycle, then the browser history cursor is
    // restored without consuming a chapter entry.
    var restoringHistoryAfterModal = false;
    window.addEventListener('popstate', function (event) {
      if (restoringHistoryAfterModal) {
        restoringHistoryAfterModal = false;
        event.stopImmediatePropagation();
        return;
      }
      var transientOverlayOpen = document.documentElement.getAttribute(
        'data-portfolio-transient-overlay'
      ) === 'true';
      if (transientOverlayOpen) {
        event.stopImmediatePropagation();
        restoringHistoryAfterModal = true;
        window.dispatchEvent(new KeyboardEvent('keydown', {
          key: 'Escape',
          code: 'Escape',
          bubbles: true,
        }));
        window.dispatchEvent(new KeyboardEvent('keyup', {
          key: 'Escape',
          code: 'Escape',
          bubbles: true,
        }));
        window.setTimeout(function () {
          window.history.forward();
        }, 120);
        return;
      }
      event.stopImmediatePropagation();
      window.dispatchEvent(new Event('portfolio-popstate'));
    }, true);
  </script>
