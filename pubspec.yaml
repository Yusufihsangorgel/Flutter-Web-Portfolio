name: flutter_web_portfolio
description: 'A data-driven Flutter Web portfolio for verified engineering work.'
publish_to: 'none'

version: 2.0.0+12

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  adaptive_render_budget:
    path: packages/adaptive_render_budget
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & navigation
  flutter_bloc: ^9.1.1

  # UI components
  url_launcher: ^6.3.2
  # Storage
  shared_preferences: ^2.5.5
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/build/
    - assets/content/
    - assets/content/locales/
    - assets/i18n/
    - assets/presentation/
    - assets/work/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Variable.ttf
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
    - family: Noto Sans Arabic
      fonts:
        - asset: assets/fonts/noto_sans_arabic/NotoSansArabic-Variable.ttf
    - family: Noto Sans Devanagari
      fonts:
        - asset: assets/fonts/noto_sans_devanagari/NotoSansDevanagari-Variable.ttf

  generate: true
