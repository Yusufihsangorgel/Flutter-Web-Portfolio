name: flutter_web_portfolio
description: 'Modern and responsive Flutter web portfolio application.'
publish_to: 'none'

version: 1.1.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.2'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_i18n: ^0.37.1
  cupertino_icons: ^1.0.8

  # State management & navigation
  flutter_bloc: ^9.1.1

  # UI components
  url_launcher: ^6.3.2
  http: ^1.2.2

  # Localization
  intl: ^0.20.2

  # Storage
  shared_preferences: ^2.5.5
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/i18n/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 100
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 200
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 300
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 800
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 900
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
          weight: 300
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
          weight: 400
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
          weight: 500
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
          weight: 600
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
          weight: 700
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 100
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 200
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 300
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 400
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 500
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 600
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 700
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
          weight: 800

  generate: true
